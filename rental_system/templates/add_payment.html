{% load static %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">

<h2>Add Payment</h2>

<a href="/">Back to Dashboard</a>

<form method="POST">
{% csrf_token %}

<select name="tenant">
{% for t in tenants %}
<option value="{{ t.id }}">{{ t.name }}</option>
{% endfor %}
</select>

<input type="number" name="amount" placeholder="Amount">
<input type="date" name="date">

{% if is_owner %}
<select name="status">
<option>Paid</option>
<option>Pending</option>
</select>
{% endif %}

<button>{% if is_owner %}Add Payment{% else %}Submit Payment{% endif %}</button>
</form>
